<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | PistolHero</title>
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <canvas id="unity-canvas" width=1080 height=1920 tabindex="-1" style="background: #231F20"></canvas>
    <script src="Build/PistolHero_WebGLBuild.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      const targetAspect = 1080 / 1920;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";

        document.body.style.textAlign = "left";
      } else {
        // Desktop style: scale to fit viewport with margin
        const viewportScale = 0.88;

        function resizeCanvas() {
          const viewportWidth = window.innerWidth;
          const viewportHeight = window.innerHeight;
          let width = viewportWidth * viewportScale;
          let height = width / targetAspect;

          if (height > viewportHeight * viewportScale) {
            height = viewportHeight * viewportScale;
            width = height * targetAspect;
          }

          canvas.style.width = Math.floor(width) + "px";
          canvas.style.height = Math.floor(height) + "px";
        }

        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();
      }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/PistolHero_WebGLBuild.data",
        frameworkUrl: "Build/PistolHero_WebGLBuild.framework.js",
        codeUrl: "Build/PistolHero_WebGLBuild.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "PistolHero",
        productVersion: "0.1",
        // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
        // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      });
    </script>
  </body>
</html>
